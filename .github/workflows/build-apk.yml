name: Build APK

# Roda ao dar push na pasta mobile/, ou manualmente pela aba "Actions" no GitHub.
on:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      # Trava a versão do pip usada em TODO o processo (inclusive nas
      # instalações internas que o próprio python-for-android dispara,
      # fora do nosso controle direto). O pip mais recente disponível hoje
      # está com um bug de auto-atualização dentro de venvs recém-criadas
      # (ImportError em pip._vendor.resolvelib) — forçar uma versão mais
      # antiga e estável evita esse problema por completo.
      PIP_CONSTRAINT: ${{ github.workspace }}/pip-constraints.txt
    steps:
      - uses: actions/checkout@v4

      - name: Criar arquivo de restrição de versão do pip
        run: echo "pip==24.0" > pip-constraints.txt

      - name: Instalar dependências de sistema
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev cmake libffi-dev libssl-dev automake

      - name: Cache do Buildozer (SDK/NDK) para acelerar próximas builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            mobile/.buildozer
          key: buildozer-${{ hashFiles('mobile/buildozer.spec') }}

      - name: Instalar Buildozer
        run: |
          pip3 install --user buildozer==1.5.0 cython==0.29.33

      - name: Rodar Buildozer (gera o APK)
        working-directory: mobile
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export JAVA_HOME="$JAVA_HOME_17_X64"
          yes | buildozer -v android debug

      - name: Publicar o APK gerado
        uses: actions/upload-artifact@v4
        with:
          name: mapa-numerologico-apk
          path: mobile/bin/*.apk
